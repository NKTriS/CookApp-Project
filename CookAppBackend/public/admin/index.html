<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CookApp Admin Panel</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- LOGIN SCREEN -->
    <div id="login-screen" class="login-screen">
        <div class="login-card">
            <div class="login-logo">🍳</div>
            <h1 class="login-title">CookApp Admin</h1>
            <p class="login-subtitle">Đăng nhập với tài khoản Admin</p>
            <form id="login-form" autocomplete="off">
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="login-email" placeholder="admin@cookapp.vn" required>
                </div>
                <div class="form-group">
                    <label>Mật khẩu</label>
                    <input type="password" id="login-password" placeholder="••••••••" required>
                </div>
                <div id="login-error" class="login-error" style="display:none"></div>
                <button type="submit" class="btn-login">Đăng nhập</button>
            </form>
        </div>
    </div>

    <!-- ADMIN DASHBOARD -->
    <div id="app" class="app" style="display:none">
        <!-- Mobile Sidebar Overlay -->
        <div id="sidebar-overlay" class="sidebar-overlay"></div>

        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <span class="sidebar-logo">🍳</span>
                <span class="sidebar-title">CookApp</span>
                <span class="sidebar-badge">Admin</span>
            </div>
            <nav class="sidebar-nav">
                <a href="#" class="nav-item active" data-page="dashboard">
                    <span class="nav-icon">📊</span>
                    <span class="nav-label">Dashboard</span>
                </a>
                <a href="#" class="nav-item" data-page="orders">
                    <span class="nav-icon">📦</span>
                    <span class="nav-label">Đơn hàng</span>
                </a>
                <a href="#" class="nav-item" data-page="recipes">
                    <span class="nav-icon">🍲</span>
                    <span class="nav-label">Công thức</span>
                </a>
                <a href="#" class="nav-item" data-page="users">
                    <span class="nav-icon">👥</span>
                    <span class="nav-label">Người dùng</span>
                </a>
                <a href="#" class="nav-item" data-page="posts">
                    <span class="nav-icon">📝</span>
                    <span class="nav-label">Bài viết</span>
                </a>
                <a href="#" class="nav-item" data-page="reviews">
                    <span class="nav-icon">⭐</span>
                    <span class="nav-label">Đánh giá</span>
                </a>
            </nav>
            <div class="sidebar-footer">
                <div class="admin-info">
                    <div class="admin-avatar">👨‍🍳</div>
                    <div>
                        <div class="admin-name" id="admin-name">Admin</div>
                        <div class="admin-role">Quản trị viên</div>
                    </div>
                </div>
                <button class="btn-logout" id="btn-logout">Đăng xuất</button>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <header class="topbar">
                <div class="topbar-left">
                    <button id="sidebar-toggle" class="sidebar-toggle" aria-label="Menu">
                        <span></span><span></span><span></span>
                    </button>
                    <h2 id="page-title" class="page-title">Dashboard</h2>
                </div>
                <div class="topbar-actions">
                    <span id="current-time" class="current-time"></span>
                </div>
            </header>
            <div id="page-content" class="page-content">
                <!-- Dynamic content injected here -->
            </div>
        </main>
    </div>

    <script src="app.js"></script>
</body>
</html>

<!-- Cập nhật -->
